name: 🐛 Bug Report
description: 게임 또는 시스템에서 발생한 버그를 신고합니다.
title: "[Bug] "
labels: ["bug"]
assignees: []

body:
  - type: textarea
    id: description
    attributes:
      label: 무슨 일이 일어났나요?
      placeholder: |
        어떤 상황에서 어떤 문제가 생겼는지 자유롭게 설명해주세요.
        스크린샷이나 영상이 있으면 여기 첨부해도 좋습니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법 (선택)
      placeholder: |
        1. 
        2. 
        3.

  - type: textarea
    id: extra
    attributes:
      label: 참고 사항 (선택)
      placeholder: Godot 버전, 에러 로그, 관련 파일명 등 추가로 전달할 내용
